document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"65bd5727-afaf-44d5-923b-4f516b84916f\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"8bdfa778-95c5-4ffe-b98d-d502cb3d9fa1\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  body{margin:0}\n  @keyframes sgbeat{0%,100%{box-shadow:0 0 0 0 rgba(196,242,76,.5)}50%{box-shadow:0 0 0 7px rgba(196,242,76,0)}}\n  .sg-range{-webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:3px;background:#DADAE2;outline:none;margin-top:16px}\n  .sg-range::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#121218;border:4px solid #C4F24C;cursor:pointer}\n  .sg-range::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#121218;border:4px solid #C4F24C;cursor:pointer}\n  .sg-num{font-family:'Geist Mono',monospace;font-weight:600;font-size:19px;font-variant-numeric:tabular-nums;text-align:right;background:transparent;border:none;border-bottom:1.5px solid #DADAE2;color:#121218;width:130px;padding:2px 0 3px;outline:none;-moz-appearance:textfield;transition:border-color .15s}\n  .sg-num:hover{border-bottom-color:#5E5E69}\n  .sg-num:focus{border-bottom-color:#C4F24C}\n  .sg-num::-webkit-outer-spin-button,.sg-num::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}\n<\u002Fstyle>\n<\u002Fhelmet>\n<x-import component-from-global-scope=\"deck-stage\" from=\"02f66c08-62cf-4896-a092-10bc984ebf9f#/deck-stage.js\" width=\"1920\" height=\"1080\" hint-size=\"100%,100%\" data-uneditable=\"\">\n\n  <section data-label=\"Cover\" data-speaker-notes=\"SimGym: the proving ground for production agents. Custom gyms inside your CI that catch regressions before they ship.\" style=\"background:radial-gradient(130% 120% at 82% 8%, rgba(196,242,76,0.10), transparent 55%),#0A0A0C;color:#EAEAEE;font-family:'Geist',sans-serif;letter-spacing:-0.011em;padding:120px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden\">\n    <svg sc-camel-view-box=\"0 0 600 400\" style=\"position:absolute;top:12%;right:-40px;width:720px;opacity:.9;pointer-events:none\" fill=\"none\" aria-hidden=\"true\">\n      <g opacity=\"0.5\" stroke=\"#33333D\" stroke-width=\"2\">\n        <path d=\"M30 260 H170 H310 H450 H590\"><\u002Fpath>\n        <path d=\"M310 260 C380 260 390 160 450 160 H590\"><\u002Fpath>\n        <path d=\"M590 260 h60\" stroke-dasharray=\"4 7\"><\u002Fpath>\n      <\u002Fg>\n      <g fill=\"#33333D\"><circle cx=\"30\" cy=\"260\" r=\"8\"><\u002Fcircle><circle cx=\"170\" cy=\"260\" r=\"8\"><\u002Fcircle><circle cx=\"310\" cy=\"260\" r=\"8\"><\u002Fcircle><circle cx=\"450\" cy=\"260\" r=\"8\"><\u002Fcircle><circle cx=\"590\" cy=\"260\" r=\"8\"><\u002Fcircle><circle cx=\"450\" cy=\"160\" r=\"8\"><\u002Fcircle><\u002Fg>\n      <circle cx=\"590\" cy=\"160\" r=\"22\" fill=\"none\" stroke=\"#C4F24C\" stroke-width=\"2\" opacity=\"0.45\"><\u002Fcircle>\n      <circle cx=\"590\" cy=\"160\" r=\"13\" fill=\"#C4F24C\" stroke=\"#0A0A0C\" stroke-width=\"2\"><\u002Fcircle>\n    <\u002Fsvg>\n    <div style=\"position:relative;z-index:1;max-width:1440px;margin:0 auto;width:100%\">\n      <span style=\"font-family:'Geist Mono',monospace;font-size:15px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:#8C8C97\"><span style=\"color:#C4F24C\">◆<\u002Fspan>&nbsp; The proving ground for production agents<\u002Fspan>\n      <div style=\"display:flex;align-items:center;gap:20px;margin-top:34px\">\n        <svg sc-camel-view-box=\"0 0 44 44\" width=\"52\" height=\"52\" aria-hidden=\"true\" data-comment-anchor=\"cac2b3a247-svg\"><line x1=\"13\" y1=\"22\" x2=\"31\" y2=\"22\" stroke=\"#EAEAEE\" stroke-width=\"4.5\" stroke-linecap=\"round\"><\u002Fline><circle cx=\"12\" cy=\"22\" r=\"7.5\" fill=\"#EAEAEE\"><\u002Fcircle><circle cx=\"32\" cy=\"22\" r=\"7\" fill=\"#C4F24C\" stroke=\"#0A0A0C\" stroke-width=\"1.6\"><\u002Fcircle><\u002Fsvg>\n        <span style=\"font-size:52px;font-weight:700;letter-spacing:-0.03em\">Sim<b style=\"color:#C4F24C\">Gym<\u002Fb><\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"font-size:98px;font-weight:700;letter-spacing:-0.05em;line-height:0.96;margin:44px 0 0\">Simulated testing<br>environments<br><span style=\"color:#55555F\">for agents.<\u002Fspan><\u002Fh1>\n      <p style=\"font-size:26px;color:#8C8C97;max-width:44ch;line-height:1.5;margin:38px 0 0\">Custom-built gyms that run inside your CI/CD to catch regressions — before they reach production.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"position:absolute;bottom:60px;left:120px;font-family:'Geist Mono',monospace;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#55555F;z-index:1\">Confidential Briefing<\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Real eval\" data-speaker-notes=\"Agents read and write across systems. A real eval runs the whole trajectory and checkpoints every step.\" style=\"background:#F5F5F7;color:#121218;font-family:'Geist',sans-serif;letter-spacing:-0.011em;padding:96px 120px;display:flex;flex-direction:column;justify-content:center\">\n    <div style=\"max-width:1440px;margin:0 auto;width:100%\">\n      <span style=\"font-family:'Geist Mono',monospace;font-size:14px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:#5E5E69\"><span style=\"color:#6E8C16\">◆<\u002Fspan>&nbsp; 01 · What makes a real eval<\u002Fspan>\n      <h2 style=\"font-size:60px;font-weight:700;letter-spacing:-0.04em;line-height:1.02;margin:22px 0 0;max-width:24ch\">Most \"evals\" only read. A real one has to act.<\u002Fh2>\n      <p style=\"font-size:23px;color:#5E5E69;max-width:64ch;line-height:1.5;margin:26px 0 0\">Agents don't just answer — they <span style=\"color:#121218;font-weight:500\">read and write across your systems<\u002Fspan>. Testing them means running the whole trajectory and checking every step, not grading a final answer.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:44px\">\n        <div style=\"border:1px solid #E7E7EC;border-radius:18px;background:#FFFFFF;padding:34px 32px;display:flex;flex-direction:column\">\n          <div style=\"font-family:'Geist Mono',monospace;font-size:13px;color:#6E8C16;letter-spacing:0.12em\">SURFACE<\u002Fdiv>\n          <h3 style=\"margin:14px 0 8px;font-size:27px;font-weight:600;letter-spacing:-0.02em\">Read <span style=\"color:#9A9AA6\">+<\u002Fspan> write, internal <span style=\"color:#9A9AA6\">+<\u002Fspan> external<\u002Fh3>\n          <p style=\"margin:0 0 22px;color:#5E5E69;font-size:18px;line-height:1.5\">A real eval exercises the same actions your agent takes in production — across systems you own and systems you don't.<\u002Fp>\n          <div style=\"margin-top:auto;border:1px solid #E7E7EC;border-radius:12px;overflow:hidden;font-family:'Geist Mono',monospace;font-size:16px\">\n            <div style=\"display:grid;grid-template-columns:1.2fr 1fr 1fr;background:#FBFBFD\"><span style=\"padding:13px 16px;color:#5E5E69\"><\u002Fspan><span style=\"padding:13px 16px;border-left:1px solid #E7E7EC;color:#5E5E69\">Read<\u002Fspan><span style=\"padding:13px 16px;border-left:1px solid #E7E7EC;color:#5E5E69\">Write<\u002Fspan><\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1.2fr 1fr 1fr;border-top:1px solid #E7E7EC\"><span style=\"padding:13px 16px;color:#121218;font-weight:500\">Internal systems<\u002Fspan><span style=\"padding:13px 16px;border-left:1px solid #E7E7EC;color:#6E8C16\">✓<\u002Fspan><span style=\"padding:13px 16px;border-left:1px solid #E7E7EC;color:#6E8C16\">✓<\u002Fspan><\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1.2fr 1fr 1fr;border-top:1px solid #E7E7EC\"><span style=\"padding:13px 16px;color:#121218;font-weight:500\">External APIs<\u002Fspan><span style=\"padding:13px 16px;border-left:1px solid #E7E7EC;color:#6E8C16\">✓<\u002Fspan><span style=\"padding:13px 16px;border-left:1px solid #E7E7EC;color:#6E8C16\">✓<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #E7E7EC;border-radius:18px;background:#FFFFFF;padding:34px 32px;display:flex;flex-direction:column\">\n          <div style=\"font-family:'Geist Mono',monospace;font-size:13px;color:#6E8C16;letter-spacing:0.12em\">DEPTH<\u002Fdiv>\n          <h3 style=\"margin:14px 0 8px;font-size:27px;font-weight:600;letter-spacing:-0.02em\">Deep, checkpointed trajectory analysis<\u002Fh3>\n          <p style=\"margin:0 0 22px;color:#5E5E69;font-size:18px;line-height:1.5\">We checkpoint the entire run — every tool call and state change — so a failure buried mid-trajectory can't hide behind a correct-looking answer.<\u002Fp>\n          <div style=\"margin-top:auto;background:#0B0B0E;border:1px solid #23232C;border-radius:12px;padding:22px 22px 18px;font-family:'Geist Mono',monospace;font-size:16px;color:#EAEAEE;line-height:2.0\">\n            <div><span style=\"color:#C4F24C\">◆ ckpt 01<\u002Fspan>&nbsp; plan<\u002Fdiv>\n            <div><span style=\"color:#C4F24C\">◆ ckpt 02<\u002Fspan>&nbsp; fetch_order()&nbsp;&nbsp; <span style=\"color:#55555F\">read<\u002Fspan><\u002Fdiv>\n            <div><span style=\"color:#C4F24C\">◆ ckpt 03<\u002Fspan>&nbsp; issue_refund()&nbsp; <span style=\"color:#55555F\">write<\u002Fspan><\u002Fdiv>\n            <div><span style=\"color:#C4F24C\">◆ ckpt 04<\u002Fspan>&nbsp; reply()&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; <span style=\"color:#55555F\">verified<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Your gym\" data-speaker-notes=\"Not a generic benchmark. We build the gym around your agent and account for every way it can fail.\" style=\"background:#F5F5F7;color:#121218;font-family:'Geist',sans-serif;letter-spacing:-0.011em;padding:96px 120px;display:flex;flex-direction:column;justify-content:center\">\n    <div style=\"max-width:1440px;margin:0 auto;width:100%\">\n      <span style=\"font-family:'Geist Mono',monospace;font-size:14px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:#5E5E69\"><span style=\"color:#6E8C16\">◆<\u002Fspan>&nbsp; 02 · Your gym<\u002Fspan>\n      <h2 style=\"font-size:60px;font-weight:700;letter-spacing:-0.04em;line-height:1.02;margin:22px 0 0;max-width:22ch\">Built to your prompt, your systems, your tools.<\u002Fh2>\n      <p style=\"font-size:23px;color:#5E5E69;max-width:62ch;line-height:1.5;margin:26px 0 0\">Not a generic benchmark. We construct the gym around your agent — then account for <span style=\"color:#121218;font-weight:500\">every way it can fail<\u002Fspan>.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-top:44px\">\n        <div style=\"border:1px solid #E7E7EC;border-radius:16px;background:#FFFFFF;padding:26px 28px\"><div style=\"font-weight:600;font-size:22px;letter-spacing:-0.01em;display:flex;align-items:center;gap:12px\"><span style=\"width:10px;height:10px;border-radius:50%;background:#C4F24C;flex:none\"><\u002Fspan>Tool failures<\u002Fdiv><p style=\"margin:12px 0 0;color:#5E5E69;font-size:18px;line-height:1.45\">Timeouts, 4xx/5xx, malformed responses, partial writes.<\u002Fp><\u002Fdiv>\n        <div style=\"border:1px solid #E7E7EC;border-radius:16px;background:#FFFFFF;padding:26px 28px\"><div style=\"font-weight:600;font-size:22px;letter-spacing:-0.01em;display:flex;align-items:center;gap:12px\"><span style=\"width:10px;height:10px;border-radius:50%;background:#C4F24C;flex:none\"><\u002Fspan>Reasoning failures<\u002Fdiv><p style=\"margin:12px 0 0;color:#5E5E69;font-size:18px;line-height:1.45\">Wrong tool, wrong order, hallucinated steps, infinite loops.<\u002Fp><\u002Fdiv>\n        <div style=\"border:1px solid #E7E7EC;border-radius:16px;background:#FFFFFF;padding:26px 28px\"><div style=\"font-weight:600;font-size:22px;letter-spacing:-0.01em;display:flex;align-items:center;gap:12px\"><span style=\"width:10px;height:10px;border-radius:50%;background:#C4F24C;flex:none\"><\u002Fspan>Contradicting instructions<\u002Fdiv><p style=\"margin:12px 0 0;color:#5E5E69;font-size:18px;line-height:1.45\">Conflicting policies, ambiguous asks, instruction collisions.<\u002Fp><\u002Fdiv>\n        <div style=\"border:1px solid #E7E7EC;border-radius:16px;background:#FFFFFF;padding:26px 28px\"><div style=\"font-weight:600;font-size:22px;letter-spacing:-0.01em;display:flex;align-items:center;gap:12px\"><span style=\"width:10px;height:10px;border-radius:50%;background:#C4F24C;flex:none\"><\u002Fspan>Prompt safety<\u002Fdiv><p style=\"margin:12px 0 0;color:#5E5E69;font-size:18px;line-height:1.45\">Injection, jailbreaks, and data-exfiltration attempts.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"margin-top:22px;font-family:'Geist Mono',monospace;font-size:16px;color:#9A9AA6\">+ schema breaks, idempotency, and the long tail specific to your domain.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Environment\" data-speaker-notes=\"Damaging actions need somewhere safe to run. We simulate your tools and run your real agent through the gym's scenarios.\" style=\"background:#F5F5F7;color:#121218;font-family:'Geist',sans-serif;letter-spacing:-0.011em;padding:96px 120px;display:flex;flex-direction:column;justify-content:center\">\n    <div style=\"max-width:1440px;margin:0 auto;width:100%\">\n      <span style=\"font-family:'Geist Mono',monospace;font-size:14px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:#5E5E69\"><span style=\"color:#6E8C16\">◆<\u002Fspan>&nbsp; 03 · The environment<\u002Fspan>\n      <h2 style=\"font-size:56px;font-weight:700;letter-spacing:-0.04em;line-height:1.02;margin:22px 0 0;max-width:26ch\">Without an environment, a gym can't test what breaks things.<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:1.05fr 1fr;gap:56px;align-items:center;margin-top:44px\">\n        <div>\n          <p style=\"font-size:22px;color:#5E5E69;line-height:1.5;margin:0 0 26px\">The actions that cause real damage — <span style=\"color:#121218;font-weight:500\">writes, deletes, refunds<\u002Fspan> — need somewhere safe to run. So that's what we set up: a simulated environment of your tools, with your agent on its real harness.<\u002Fp>\n          <ol style=\"list-style:none;margin:0;padding:0\">\n            <li style=\"display:flex;gap:16px;align-items:flex-start;padding:17px 0;border-top:1px solid #E7E7EC;font-size:20px;line-height:1.4\"><span style=\"font-family:'Geist Mono',monospace;font-size:15px;color:#6E8C16;flex:none;padding-top:3px\">01<\u002Fspan><span>Simulate your tools into a <b style=\"font-weight:600\">safe environment<\u002Fb><\u002Fspan><\u002Fli>\n            <li style=\"display:flex;gap:16px;align-items:flex-start;padding:17px 0;border-top:1px solid #E7E7EC;font-size:20px;line-height:1.4\"><span style=\"font-family:'Geist Mono',monospace;font-size:15px;color:#6E8C16;flex:none;padding-top:3px\">02<\u002Fspan><span>Spin your agent up on the <b style=\"font-weight:600\">same harness<\u002Fb> it runs on<\u002Fspan><\u002Fli>\n            <li style=\"display:flex;gap:16px;align-items:flex-start;padding:17px 0;border-top:1px solid #E7E7EC;font-size:20px;line-height:1.4\"><span style=\"font-family:'Geist Mono',monospace;font-size:15px;color:#6E8C16;flex:none;padding-top:3px\">03<\u002Fspan><span>Run it through the <b style=\"font-weight:600\">gym's scenarios<\u002Fb><\u002Fspan><\u002Fli>\n            <li style=\"display:flex;gap:16px;align-items:flex-start;padding:17px 0;border-top:1px solid #E7E7EC;font-size:20px;line-height:1.4\"><span style=\"font-family:'Geist Mono',monospace;font-size:15px;color:#6E8C16;flex:none;padding-top:3px\">04<\u002Fspan><span>Generate a <b style=\"font-weight:600\">report<\u002Fb><\u002Fspan><\u002Fli>\n          <\u002Fol>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:center\">\n          <svg sc-camel-view-box=\"0 0 420 420\" width=\"100%\" style=\"max-width:500px\" aria-label=\"A gym at the center, encircled by a rotating simulated tool wrapper. Your agent flows in and a report flows out.\">\n            <defs>\n              <marker id=\"ah\" sc-camel-marker-width=\"8\" sc-camel-marker-height=\"8\" sc-camel-ref-x=\"6\" sc-camel-ref-y=\"4\" orient=\"auto\"><path d=\"M0 0 L8 4 L0 8 z\" fill=\"#B7B7C2\"><\u002Fpath><\u002Fmarker>\n              <radialGradient id=\"sg-glow\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n                <stop offset=\"0%\" stop-color=\"#C4F24C\" stop-opacity=\"0.34\"><\u002Fstop>\n                <stop offset=\"65%\" stop-color=\"#C4F24C\" stop-opacity=\"0.06\"><\u002Fstop>\n                <stop offset=\"100%\" stop-color=\"#C4F24C\" stop-opacity=\"0\"><\u002Fstop>\n              <\u002FradialGradient>\n            <\u002Fdefs>\n\n            <circle cx=\"210\" cy=\"214\" r=\"118\" fill=\"url(#sg-glow)\">\n              <animate sc-camel-attribute-name=\"r\" values=\"104;126;104\" dur=\"4.2s\" sc-camel-repeat-count=\"indefinite\"><\u002Fanimate>\n              <animate sc-camel-attribute-name=\"opacity\" values=\"0.65;1;0.65\" dur=\"4.2s\" sc-camel-repeat-count=\"indefinite\"><\u002Fanimate>\n            <\u002Fcircle>\n\n            <g>\n              <circle cx=\"210\" cy=\"214\" r=\"192\" fill=\"none\" stroke=\"#DADAE2\" stroke-width=\"1.5\" stroke-dasharray=\"2 11\"><\u002Fcircle>\n              <animateTransform sc-camel-attribute-name=\"transform\" type=\"rotate\" from=\"0 210 214\" to=\"360 210 214\" dur=\"60s\" sc-camel-repeat-count=\"indefinite\"><\u002FanimateTransform>\n            <\u002Fg>\n            <g>\n              <circle cx=\"210\" cy=\"214\" r=\"150\" fill=\"rgba(196,242,76,0.04)\" stroke=\"#CBCBD5\" stroke-width=\"2\" stroke-dasharray=\"7 9\"><\u002Fcircle>\n              <animateTransform sc-camel-attribute-name=\"transform\" type=\"rotate\" from=\"360 210 214\" to=\"0 210 214\" dur=\"46s\" sc-camel-repeat-count=\"indefinite\"><\u002FanimateTransform>\n            <\u002Fg>\n            <text x=\"210\" y=\"86\" text-anchor=\"middle\" font-family=\"ui-monospace,monospace\" font-size=\"11\" letter-spacing=\"2\" fill=\"#8C8C97\">SIMULATED TOOL WRAPPER<\u002Ftext>\n\n            <g>\n              <g>\n                <circle cx=\"210\" cy=\"98\" r=\"5\" fill=\"#C4F24C\"><\u002Fcircle>\n                <circle cx=\"326\" cy=\"214\" r=\"4\" fill=\"#B7B7C2\"><\u002Fcircle>\n                <circle cx=\"210\" cy=\"330\" r=\"5\" fill=\"#C4F24C\"><\u002Fcircle>\n                <circle cx=\"94\" cy=\"214\" r=\"4\" fill=\"#B7B7C2\"><\u002Fcircle>\n                <circle cx=\"292\" cy=\"132\" r=\"3.5\" fill=\"#B7B7C2\"><\u002Fcircle>\n                <circle cx=\"128\" cy=\"296\" r=\"3.5\" fill=\"#C4F24C\"><\u002Fcircle>\n                <circle cx=\"292\" cy=\"296\" r=\"3.5\" fill=\"#B7B7C2\"><\u002Fcircle>\n                <circle cx=\"128\" cy=\"132\" r=\"3.5\" fill=\"#C4F24C\"><\u002Fcircle>\n              <\u002Fg>\n              <animateTransform sc-camel-attribute-name=\"transform\" type=\"rotate\" from=\"0 210 214\" to=\"360 210 214\" dur=\"26s\" sc-camel-repeat-count=\"indefinite\"><\u002FanimateTransform>\n            <\u002Fg>\n\n            <circle cx=\"210\" cy=\"214\" r=\"80\" fill=\"#FFFFFF\" stroke=\"#C4F24C\" stroke-width=\"3\">\n              <animate sc-camel-attribute-name=\"stroke-width\" values=\"3;4.6;3\" dur=\"4.2s\" sc-camel-repeat-count=\"indefinite\"><\u002Fanimate>\n            <\u002Fcircle>\n            <text x=\"210\" y=\"208\" text-anchor=\"middle\" font-family=\"Geist,system-ui,sans-serif\" font-size=\"30\" font-weight=\"700\" fill=\"#121218\">GYM<\u002Ftext>\n            <text x=\"210\" y=\"236\" text-anchor=\"middle\" font-family=\"ui-monospace,monospace\" font-size=\"11\" fill=\"#8C8C97\">scenarios<\u002Ftext>\n\n            <circle cx=\"26\" cy=\"214\" r=\"16\" fill=\"#EDEDF1\" stroke=\"#DADAE2\" stroke-width=\"1.5\"><\u002Fcircle>\n            <text x=\"26\" y=\"252\" text-anchor=\"middle\" font-family=\"ui-monospace,monospace\" font-size=\"10\" fill=\"#8C8C97\">your agent<\u002Ftext>\n            <line x1=\"46\" y1=\"214\" x2=\"126\" y2=\"214\" stroke=\"#B7B7C2\" stroke-width=\"2\" stroke-dasharray=\"4 5\" marker-end=\"url(#ah)\">\n              <animate sc-camel-attribute-name=\"stroke-dashoffset\" values=\"18;0\" dur=\"0.9s\" sc-camel-repeat-count=\"indefinite\"><\u002Fanimate>\n            <\u002Fline>\n            <circle r=\"4.5\" fill=\"#C4F24C\">\n              <animateMotion path=\"M46,214 L120,214\" dur=\"2s\" sc-camel-repeat-count=\"indefinite\"><\u002FanimateMotion>\n              <animate sc-camel-attribute-name=\"opacity\" values=\"0;1;1;0\" dur=\"2s\" sc-camel-repeat-count=\"indefinite\"><\u002Fanimate>\n            <\u002Fcircle>\n\n            <line x1=\"294\" y1=\"214\" x2=\"366\" y2=\"214\" stroke=\"#B7B7C2\" stroke-width=\"2\" stroke-dasharray=\"4 5\" marker-end=\"url(#ah)\">\n              <animate sc-camel-attribute-name=\"stroke-dashoffset\" values=\"18;0\" dur=\"0.9s\" sc-camel-repeat-count=\"indefinite\"><\u002Fanimate>\n            <\u002Fline>\n            <circle cx=\"392\" cy=\"214\" r=\"16\" fill=\"#FFFFFF\" stroke=\"#C4F24C\" stroke-width=\"2\"><\u002Fcircle>\n            <text x=\"392\" y=\"252\" text-anchor=\"middle\" font-family=\"ui-monospace,monospace\" font-size=\"10\" fill=\"#6E8C16\">report<\u002Ftext>\n            <circle r=\"4.5\" fill=\"#C4F24C\">\n              <animateMotion path=\"M300,214 L374,214\" dur=\"2s\" begin=\"1s\" sc-camel-repeat-count=\"indefinite\"><\u002FanimateMotion>\n              <animate sc-camel-attribute-name=\"opacity\" values=\"0;1;1;0\" dur=\"2s\" begin=\"1s\" sc-camel-repeat-count=\"indefinite\"><\u002Fanimate>\n            <\u002Fcircle>\n          <\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"CI/CD\" data-speaker-notes=\"SimGym installs as an app in your CI/CD and blocks the merge when your agent regresses.\" style=\"background:#F5F5F7;color:#121218;font-family:'Geist',sans-serif;letter-spacing:-0.011em;padding:96px 120px;display:flex;flex-direction:column;justify-content:center\">\n    <div style=\"max-width:1440px;margin:0 auto;width:100%\">\n      <span style=\"font-family:'Geist Mono',monospace;font-size:14px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:#5E5E69\"><span style=\"color:#6E8C16\">◆<\u002Fspan>&nbsp; 04 · CI/CD<\u002Fspan>\n      <h2 style=\"font-size:60px;font-weight:700;letter-spacing:-0.04em;line-height:1.02;margin:22px 0 0;max-width:22ch\">It runs as a check in your pipeline.<\u002Fh2>\n      <p style=\"font-size:23px;color:#5E5E69;max-width:60ch;line-height:1.5;margin:26px 0 0\">SimGym installs as an app in your CI/CD — <span style=\"color:#121218;font-weight:500\">GitHub Actions, Jenkins, GitLab CI<\u002Fspan> — and blocks the merge when your agent regresses.<\u002Fp>\n      <div style=\"margin-top:44px;border:1px solid #E7E7EC;border-radius:16px;overflow:hidden;background:#FFFFFF;max-width:840px\">\n        <div style=\"display:flex;align-items:center;gap:16px;padding:20px 26px;font-size:19px\"><span style=\"font-family:'Geist Mono',monospace;width:18px;color:#9A9AA6;text-align:center\">✓<\u002Fspan><span style=\"font-weight:500\">build<\u002Fspan><span style=\"margin-left:auto;font-family:'Geist Mono',monospace;font-size:15px;color:#5E5E69\">passed<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:16px;padding:20px 26px;border-top:1px solid #E7E7EC;font-size:19px\"><span style=\"font-family:'Geist Mono',monospace;width:18px;color:#9A9AA6;text-align:center\">✓<\u002Fspan><span style=\"font-weight:500\">lint<\u002Fspan><span style=\"margin-left:auto;font-family:'Geist Mono',monospace;font-size:15px;color:#5E5E69\">passed<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:16px;padding:20px 26px;border-top:1px solid #E7E7EC;font-size:19px;background:rgba(196,242,76,0.10)\"><span style=\"font-family:'Geist Mono',monospace;width:18px;color:#5F7D13;text-align:center\">◆<\u002Fspan><span style=\"font-weight:500\">SimGym&nbsp;<span style=\"font-family:'Geist Mono',monospace;font-size:15px;color:#5E5E69;font-weight:400\">/ trajectory-check<\u002Fspan><\u002Fspan><span style=\"margin-left:auto;font-family:'Geist Mono',monospace;font-size:15px;color:#5F7D13\">1 regression intercepted · required<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:14px;padding:20px 26px;border-top:1px solid #E7E7EC;background:#FBFBFD\"><span style=\"font-family:'Geist Mono',monospace;font-size:14px;letter-spacing:0.06em;text-transform:uppercase;background:#121218;color:#F5F5F7;padding:8px 13px;border-radius:8px;font-weight:600\">Merge blocked<\u002Fspan><span style=\"font-family:'Geist Mono',monospace;font-size:16px;color:#5E5E69\">double <b style=\"color:#5F7D13\">issue_refund()<\u002Fb> caught on pr-482<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"The report\" data-speaker-notes=\"Every run curates the regressions it caught and pairs each with a suggested prompt improvement.\" style=\"background:#F5F5F7;color:#121218;font-family:'Geist',sans-serif;letter-spacing:-0.011em;padding:96px 120px;display:flex;flex-direction:column;justify-content:center\">\n    <div style=\"max-width:1440px;margin:0 auto;width:100%\">\n      <span style=\"font-family:'Geist Mono',monospace;font-size:14px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:#5E5E69\"><span style=\"color:#6E8C16\">◆<\u002Fspan>&nbsp; 05 · The report<\u002Fspan>\n      <h2 style=\"font-size:60px;font-weight:700;letter-spacing:-0.04em;line-height:1.02;margin:22px 0 0;max-width:24ch\">You get failures — and how to fix them.<\u002Fh2>\n      <p style=\"font-size:23px;color:#5E5E69;max-width:60ch;line-height:1.5;margin:26px 0 0\">Every run curates the regressions it caught and pairs each with a <span style=\"color:#121218;font-weight:500\">suggested prompt improvement<\u002Fspan>.<\u002Fp>\n      <div style=\"margin-top:40px;border:1px solid #E7E7EC;border-radius:16px;overflow:hidden;background:#FFFFFF;max-width:1080px\">\n        <div style=\"display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid #E7E7EC;font-family:'Geist Mono',monospace;font-size:15px;letter-spacing:0.06em;text-transform:uppercase;color:#5E5E69\"><span>run · refund_agent @ pr-482<\u002Fspan><span style=\"color:#5F7D13\">3 issues found<\u002Fspan><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr auto;gap:18px;padding:22px 24px;align-items:center\">\n          <span style=\"font-family:'Geist Mono',monospace;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;padding:5px 10px;border-radius:7px;height:fit-content;order:2;background:#121218;color:#F5F5F7;font-weight:600\">high<\u002Fspan>\n          <div><div style=\"font-weight:500;font-size:20px\">Double issue_refund() on retry<\u002Fdiv><div style=\"margin-top:10px;font-family:'Geist Mono',monospace;font-size:15px;background:#0B0B0E;border:1px solid #23232C;border-radius:9px;padding:13px 15px;line-height:1.5\"><span style=\"color:#8FB43A\">suggested prompt +<\u002Fspan> <span style=\"color:#EAEAEE\">\"Never call issue_refund twice for the same order_id; check refund status first.\"<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr auto;gap:18px;padding:22px 24px;align-items:center;border-top:1px solid #E7E7EC\">\n          <span style=\"font-family:'Geist Mono',monospace;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;padding:5px 10px;border-radius:7px;height:fit-content;order:2;background:#5E5E69;color:#F5F5F7;font-weight:600\">med<\u002Fspan>\n          <div><div style=\"font-weight:500;font-size:20px\">Ignores refund-cap policy under ambiguity<\u002Fdiv><div style=\"margin-top:10px;font-family:'Geist Mono',monospace;font-size:15px;background:#0B0B0E;border:1px solid #23232C;border-radius:9px;padding:13px 15px;line-height:1.5\"><span style=\"color:#8FB43A\">suggested prompt +<\u002Fspan> <span style=\"color:#EAEAEE\">\"Refund policy overrides the customer's request when the two conflict.\"<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr auto;gap:18px;padding:22px 24px;align-items:center;border-top:1px solid #E7E7EC\">\n          <span style=\"font-family:'Geist Mono',monospace;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;padding:5px 10px;border-radius:7px;height:fit-content;order:2;background:#9A9AA6;color:#F5F5F7;font-weight:600\">low<\u002Fspan>\n          <div><div style=\"font-weight:500;font-size:20px\">Narrated preamble inflates tool latency<\u002Fdiv><div style=\"margin-top:10px;font-family:'Geist Mono',monospace;font-size:15px;background:#0B0B0E;border:1px solid #23232C;border-radius:9px;padding:13px 15px;line-height:1.5\"><span style=\"color:#8FB43A\">suggested prompt +<\u002Fspan> <span style=\"color:#EAEAEE\">\"Call tools directly. Do not narrate each step to the user.\"<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"The cost\" data-speaker-notes=\"Interactive: punch in sessions, cost per error, error rate. The monthly and annual leak update live.\" style=\"background:#F5F5F7;color:#121218;font-family:'Geist',sans-serif;letter-spacing:-0.011em;padding:96px 120px;display:flex;flex-direction:column;justify-content:center\">\n    <div style=\"max-width:1440px;margin:0 auto;width:100%\">\n      <span style=\"font-family:'Geist Mono',monospace;font-size:14px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:#5E5E69\"><span style=\"color:#6E8C16\">◆<\u002Fspan>&nbsp; 06 · The cost<\u002Fspan>\n      <h2 style=\"font-size:60px;font-weight:700;letter-spacing:-0.04em;line-height:1.02;margin:22px 0 0;max-width:24ch\">What's a silent failure actually costing you?<\u002Fh2>\n      <p style=\"font-size:23px;color:#5E5E69;max-width:60ch;line-height:1.5;margin:26px 0 0\">Punch in your own numbers. <span style=\"color:#121218;font-weight:500\">It updates live.<\u002Fspan><\u002Fp>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:44px;align-items:stretch\">\n        <div style=\"display:flex;flex-direction:column;justify-content:center;gap:34px;border:1px solid #E7E7EC;border-radius:16px;background:#FFFFFF;padding:38px 34px\">\n          <div>\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;font-size:18px\"><label style=\"color:#5E5E69\">Agent sessions / month<\u002Flabel><input class=\"sg-num\" type=\"number\" min=\"5000\" max=\"1000000\" step=\"1000\" value=\"{{ sessions }}\" sc-camel-on-input=\"{{ onSessions }}\" aria-label=\"Agent sessions per month\"><\u002Fdiv>\n            <input class=\"sg-range\" type=\"range\" min=\"5000\" max=\"1000000\" step=\"1000\" value=\"{{ sessions }}\" sc-camel-on-input=\"{{ onSessions }}\" aria-label=\"Agent sessions per month\">\n          <\u002Fdiv>\n          <div>\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;font-size:18px\"><label style=\"color:#5E5E69\">Cost of one error ($)<\u002Flabel><input class=\"sg-num\" type=\"number\" min=\"0.1\" max=\"50\" step=\"0.1\" value=\"{{ cost }}\" sc-camel-on-input=\"{{ onCost }}\" aria-label=\"Cost of one error in dollars\"><\u002Fdiv>\n            <input class=\"sg-range\" type=\"range\" min=\"0.1\" max=\"50\" step=\"0.1\" value=\"{{ cost }}\" sc-camel-on-input=\"{{ onCost }}\" aria-label=\"Cost of one error in dollars\">\n          <\u002Fdiv>\n          <div>\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;font-size:18px\"><label style=\"color:#5E5E69\">Error rate (%)<\u002Flabel><input class=\"sg-num\" type=\"number\" min=\"1\" max=\"50\" step=\"1\" value=\"{{ rate }}\" sc-camel-on-input=\"{{ onRate }}\" aria-label=\"Error rate percent\"><\u002Fdiv>\n            <input class=\"sg-range\" type=\"range\" min=\"1\" max=\"50\" step=\"1\" value=\"{{ rate }}\" sc-camel-on-input=\"{{ onRate }}\" aria-label=\"Error rate percent\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border:1px solid #23232C;border-radius:16px;background:radial-gradient(120% 130% at 12% -20%, rgba(196,242,76,0.08), transparent 58%),#0B0B0E;color:#EAEAEE;display:flex;flex-direction:column\">\n          <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;padding:48px 44px\">\n            <div style=\"font-family:'Geist Mono',monospace;font-size:14px;color:#8C8C97;letter-spacing:0.08em;text-transform:uppercase\">Cost of errors, per year<\u002Fdiv>\n            <div style=\"font-family:'Geist Mono',monospace;font-weight:600;font-size:92px;letter-spacing:-0.04em;line-height:1;color:#C4F24C;margin-top:18px;font-variant-numeric:tabular-nums\">{{ annualOut }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"The metric\" data-speaker-notes=\"One number: regressions caught before they shipped. Our commitment is 20+ intercepted in the first six weeks.\" style=\"background:radial-gradient(130% 120% at 80% 10%, rgba(196,242,76,0.10), transparent 55%),#0A0A0C;color:#EAEAEE;font-family:'Geist',sans-serif;letter-spacing:-0.011em;padding:96px 120px;display:flex;flex-direction:column;justify-content:center\">\n    <div style=\"max-width:1440px;margin:0 auto;width:100%\">\n      <span style=\"font-family:'Geist Mono',monospace;font-size:14px;font-weight:500;letter-spacing:0.2em;text-transform:uppercase;color:#8C8C97\"><span style=\"color:#C4F24C\">◆<\u002Fspan>&nbsp; 07 · The metric<\u002Fspan>\n      <h2 style=\"font-size:58px;font-weight:700;letter-spacing:-0.04em;line-height:1.04;margin:22px 0 0;max-width:24ch\">One number: regressions caught before they shipped.<\u002Fh2>\n      <div style=\"margin-top:76px;display:flex;align-items:flex-end;gap:72px;flex-wrap:wrap\">\n        <div id=\"sg-metric-counter\" style=\"font-family:'Geist Mono',monospace;font-weight:600;font-size:300px;letter-spacing:-0.06em;line-height:0.74;color:#C4F24C;font-variant-numeric:tabular-nums\">54<\u002Fdiv>\n        <div style=\"font-size:21px;color:#8C8C97;max-width:32ch;line-height:1.55;padding-bottom:40px\"><b style=\"color:#EAEAEE;font-weight:500\">The number the engagement is judged on.<\u002Fb> Our commitment: 110+ critical regressions intercepted in the first six weeks — the case you take to your own leadership.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { sessions: 50000, cost: 5, rate: 5 };\n  renderVals() {\n    this._startPoll();\n    const { sessions, cost, rate } = this.state;\n    const monthly = sessions * (rate / 100) * cost;\n    const money = n => '$' + Math.round(n).toLocaleString('en-US');\n    return {\n      sessions, cost, rate,\n      sessionsFmt: sessions.toLocaleString('en-US'),\n      costFmt: '$' + (cost % 1 === 0 ? cost : cost.toFixed(1)),\n      rateFmt: rate + '%',\n      monthlyOut: money(monthly),\n      annualOut: money(monthly * 12),\n      onSessions: e => this.setState({ sessions: +e.target.value }),\n      onCost: e => this.setState({ cost: +e.target.value }),\n      onRate: e => this.setState({ rate: +e.target.value }),\n    };\n  }\n  _startPoll() {\n    if (this._observing) return;\n    const el = document.getElementById('sg-metric-counter');\n    if (!el) { requestAnimationFrame(() => this._startPoll()); return; }\n    const slide = el.closest('section');\n    if (!slide) { requestAnimationFrame(() => this._startPoll()); return; }\n    this._observing = true;\n    const maybeRun = () => {\n      if (slide.hasAttribute('data-deck-active') && !this._ran) {\n        this._ran = true;\n        mo.disconnect();\n        this._runCounter(el);\n      }\n    };\n    const mo = new MutationObserver(maybeRun);\n    mo.observe(slide, { attributes: true, attributeFilter: ['data-deck-active'] });\n    maybeRun();\n  }\n  _runCounter(el) {\n    if (!el) return;\n    const from = 54, target = 110, dur = 1600;\n    if (matchMedia('(prefers-reduced-motion: reduce)').matches) { el.textContent = target + '+'; return; }\n    let start = null;\n    const step = t => {\n      if (!start) start = t;\n      const p = Math.min((t - start) / dur, 1);\n      const e = 1 - Math.pow(1 - p, 3);\n      el.textContent = Math.round(from + e * (target - from)) + (p === 1 ? '+' : '');\n      if (p < 1) requestAnimationFrame(step);\n    };\n    requestAnimationFrame(step);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
